name: Build Electron Application

on:
  workflow_run:
    workflows: ["Build Cross-Platform Backend Executables"]
    types: [completed]

jobs:
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['windows-latest', 'macos-latest']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.x

    - name: Download Backend Artifact
      uses: actions/download-artifact@v4
      with:
        name: backend-executables
        path: ./src/backend/dist/

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install Dependencies
      run: npm install

    - name: Build Electron App
      run: |
        npm run build

    - name: Create Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-packaged-app
        path: ./src/build/dist/

    - name: Create MacOS Artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: macos-packaged-app
        path: ./src/build/dist/